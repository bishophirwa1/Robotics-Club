<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page For Teacher

    </title>
</head>
<style>
    @import url(style.css);
</style>u 
<body>

    <div id="login-form">
        <form action="login.html" method="post">
            <h1>Assemblies Of God Staff Members</h1>

            <p>
                <label><b>Email</b></label>
                <br>
                <Input type="email" id="eg" placeholder="Enter your Email" required></Input>
                <br>
                <br>
                <label><b>Password</b></label>
                <br>
                <Input type="password" id="password" placeholder="Enter your Password" required></Input>
                <br>
                <br>
                <input type="checkbox" id="forgot" name="Forgot">
                <b>Forgot Password</b>
                <br>
                <br>
                <input type="submit" id="sb" value="Login">
            </p>

        <p><b>Don't have an account?</b><a href="sign up.html"> Register</a></p>
    </div>
    <marquee behavior="scroll" direction="left" scrollamount="10">
        <h2>Welcome to the login page for teachers! Please enter your credentials to access your account and manage your
            classes effectively.</h2>
</body>

</html>
